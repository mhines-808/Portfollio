<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>John Doe — Data Analyst Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #090b12;
    --bg2: #0d1020;
    --bg3: #111524;
    --surface: #161b2e;
    --surface2: #1d2340;
    --border: rgba(255,255,255,0.07);
    --cyan: oklch(0.74 0.16 200);
    --cyan-dim: oklch(0.74 0.16 200 / 0.15);
    --cyan-glow: oklch(0.74 0.16 200 / 0.35);
    --mint: oklch(0.74 0.16 155);
    --mint-dim: oklch(0.74 0.16 155 / 0.15);
    --text: #e8eaf2;
    --text-muted: #7880a0;
    --text-dim: #4a5070;
    --ff-display: 'Space Grotesk', sans-serif;
    --ff-body: 'DM Sans', sans-serif;
    --ff-mono: 'JetBrains Mono', monospace;
    --radius: 12px;
    --radius-lg: 20px;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--ff-body);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Dot grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  /* Scrollbar 
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
*/
  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 0 var(--cyan-glow); }
    50% { box-shadow: 0 0 0 8px transparent; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  @keyframes shimmer {
    from { background-position: -200% center; }
    to { background-position: 200% center; }
  }
  @keyframes bar-fill {
    from { width: 0; }
  }
  @keyframes counter-up {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-up { animation: fadeUp 0.6s ease both; }
  .cursor { display: inline-block; animation: blink 1s step-end infinite; }

  /* Section common */
  .section { padding: 100px 0; position: relative; }
  .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

  .section-label {
    font-family: var(--ff-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 12px;
  }
  .section-title {
    font-family: var(--ff-display);
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 16px;
  }
  .section-title span { color: var(--cyan); }
  .section-sub {
    color: var(--text-muted);
    font-size: 1rem;
    max-width: 520px;
    line-height: 1.7;
  }
  .section-header { margin-bottom: 60px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 28px;
    border-radius: 8px;
    font-family: var(--ff-display);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    text-decoration: none;
  }
  .btn-primary {
    background: var(--cyan);
    color: #090b12;
  }
  .btn-primary:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px var(--cyan-glow);
  }
  .btn-outline {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-outline:hover {
    border-color: var(--cyan);
    color: var(--cyan);
    background: var(--cyan-dim);
  }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 28px;
    transition: all 0.25s ease;
  }
  .card:hover {
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-3px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }

  /* Nav */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    transition: all 0.3s ease;
  }
  nav.scrolled {
    background: rgba(9, 11, 18, 0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1140px;
    margin: 0 auto;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .nav-logo {
    font-family: var(--ff-display);
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .nav-logo-dot {
    width: 8px; height: 8px;
    background: var(--cyan);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--cyan);
    animation: pulse-glow 2s infinite;
  }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--ff-display);
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--text); }
  .nav-links a.active { color: var(--cyan); }

  /* Mobile nav */
  .nav-menu-btn {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px;
  }
  .nav-menu-btn span {
    display: block;
    width: 22px;
    height: 2px;
    background: var(--text);
    border-radius: 1px;
    transition: all 0.25s;
  }
  .mobile-nav {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 99;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
  }
  .mobile-nav.open { display: flex; }
  .mobile-nav a {
    font-family: var(--ff-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    text-decoration: none;
    transition: color 0.2s;
  }
  .mobile-nav a:hover { color: var(--cyan); }

  /* Hero */
  #hero {
    min-height: 100vh;
    display: flex;
    align-items: center;
    padding-top: 64px;
    position: relative;
    overflow: hidden;
  }
  .hero-glow {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, oklch(0.74 0.16 200 / 0.12) 0%, transparent 70%);
    top: -100px; right: -100px;
    pointer-events: none;
  }
  .hero-glow2 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, oklch(0.74 0.16 155 / 0.08) 0%, transparent 70%);
    bottom: 0; left: -100px;
    pointer-events: none;
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--cyan-dim);
    border: 1px solid oklch(0.74 0.16 200 / 0.25);
    border-radius: 100px;
    padding: 6px 16px;
    font-family: var(--ff-mono);
    font-size: 12px;
    color: var(--cyan);
    margin-bottom: 24px;
    animation: fadeUp 0.5s ease both;
  }
  .hero-label-dot {
    width: 6px; height: 6px;
    background: var(--cyan);
    border-radius: 50%;
    animation: pulse-glow 1.5s infinite;
  }
  .hero-name {
    font-family: var(--ff-display);
    font-size: clamp(2.8rem, 6vw, 4.5rem);
    font-weight: 700;
    line-height: 1.08;
    margin-bottom: 8px;
    animation: fadeUp 0.5s 0.1s ease both;
  }
  .hero-name .highlight {
    background: linear-gradient(135deg, var(--cyan), var(--mint));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero-role {
    font-family: var(--ff-mono);
    font-size: 18px;
    color: var(--text-muted);
    margin-bottom: 24px;
    animation: fadeUp 0.5s 0.2s ease both;
  }
  .hero-desc {
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1.75;
    max-width: 440px;
    margin-bottom: 40px;
    animation: fadeUp 0.5s 0.3s ease both;
  }
  .hero-cta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    animation: fadeUp 0.5s 0.4s ease both;
    margin-bottom: 60px;
  }
  .hero-stats {
    display: flex;
    gap: 40px;
    animation: fadeUp 0.5s 0.5s ease both;
  }
  .hero-stat-num {
    font-family: var(--ff-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
  }
  .hero-stat-num span { color: var(--cyan); }
  .hero-stat-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: var(--ff-mono);
  }

  .social-icon-link {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  text-decoration: none;
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: all 0.2s ease;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
}
.social-icon-link:hover {
  color: var(--cyan);
  border-color: oklch(0.74 0.16 200 / 0.4);
  background: var(--cyan-dim);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--cyan-glow);
}

  /* Hero visual */
  .hero-visual {
    position: relative;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .hero-card-main {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero-card-main::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--mint));
  }
  .chart-bars {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    height: 120px;
    margin: 16px 0;
  }
  .chart-bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    min-height: 8px;
    transition: all 0.3s;
    cursor: pointer;
  }
  .chart-bar:hover { filter: brightness(1.2); }
  .hero-card-label {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .hero-card-title {
    font-family: var(--ff-display);
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 16px;
  }
  .floating-badge {
    position: absolute;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: var(--ff-mono);
    font-size: 12px;
    animation: float 4s ease-in-out infinite;
    backdrop-filter: blur(10px);
  }
  .floating-badge-1 { top: -20px; right: -20px; animation-delay: 0s; }
  .floating-badge-2 { bottom: 60px; left: -30px; animation-delay: 1.5s; }
  .badge-value { font-size: 18px; font-weight: 700; color: var(--cyan); }
  .badge-label { color: var(--text-dim); font-size: 11px; }

  /* About */
  #about { background: var(--bg2); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
  }
  .about-img-wrap {
    position: relative;
  }
  .about-img-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    aspect-ratio: 3/4;
    max-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .about-img-box::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--cyan-dim) 0%, transparent 60%);
  }
  .about-placeholder-text {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
    padding: 20px;
  }
  /* Striped placeholder */
  .about-img-box {
    background: repeating-linear-gradient(
      45deg,
      var(--surface) 0px,
      var(--surface) 10px,
      var(--surface2) 10px,
      var(--surface2) 20px
    );
  }
  .about-accent-card {
    position: absolute;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 20px;
    bottom: -20px;
    right: -20px;
    backdrop-filter: blur(20px);
  }
  .about-accent-num {
    font-family: var(--ff-display);
    font-size: 32px;
    font-weight: 700;
    color: var(--cyan);
  }
  .about-accent-lbl {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--ff-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .service-cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 40px;
  }
  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: all 0.25s;
  }
  .service-card:hover {
    border-color: oklch(0.74 0.16 200 / 0.3);
    background: var(--surface2);
  }
  .service-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--cyan-dim);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    font-size: 18px;
  }
  .service-name {
    font-family: var(--ff-display);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .service-desc { font-size: 12px; color: var(--text-dim); line-height: 1.5; }

  /* Skills */
  #skills { background: var(--bg); }
  .skills-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .skill-group-title {
    font-family: var(--ff-display);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--cyan);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .skill-group-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .skill-item { margin-bottom: 16px; }
  .skill-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .skill-name { color: var(--text); font-weight: 500; }
  .skill-pct { color: var(--text-dim); font-family: var(--ff-mono); font-size: 12px; }
  .skill-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .skill-fill {
    height: 100%;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--mint));
    transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Timeline */
  #experience { background: var(--bg2); }
  .timeline {
    position: relative;
    padding-left: 40px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 12px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: linear-gradient(180deg, var(--cyan), transparent);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 48px;
  }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-dot {
    position: absolute;
    left: -34px;
    top: 6px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--cyan);
    border: 2px solid var(--bg2);
    box-shadow: 0 0 12px var(--cyan-glow);
  }
  .timeline-date {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 6px;
  }
  .timeline-role {
    font-family: var(--ff-display);
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .timeline-company {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .timeline-desc {
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
    max-width: 600px;
  }
  .timeline-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
  }
  .tag {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-family: var(--ff-mono);
  }

  /* Projects */
  #projects { background: var(--bg); }
  .filter-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .filter-tab {
    padding: 7px 18px;
    border-radius: 100px;
    font-size: 13px;
    font-family: var(--ff-display);
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .filter-tab:hover { border-color: var(--cyan); color: var(--cyan); }
  .filter-tab.active {
    background: var(--cyan);
    color: var(--bg);
    border-color: var(--cyan);
  }
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    transition: all 0.25s ease;
    cursor: pointer;
  }
  .project-card:hover {
    transform: translateY(-4px);
    border-color: oklch(0.74 0.16 200 / 0.3);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .project-thumb {
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
  }
  .project-thumb-inner {
    position: relative;
    z-index: 1;
    line-height: 1.6;
  }
  .project-body { padding: 20px; }
  .project-type {
    font-family: var(--ff-mono);
    font-size: 11px;
    color: var(--cyan);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }
  .project-title {
    font-family: var(--ff-display);
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .project-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .project-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .project-links { display: flex; gap: 8px; }
  .project-link {

// tweaks-panel.jsx

// don't hand-draw <input type="range">, segmented radios, steppers, etc.
//
// Usage (in an HTML file that loads React + Babel):
//
//   const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{

//                        options={['compact', 'regular', 'comfy']}

//           <TweakToggle label="Dark mode" value={t.dark}
//                        onChange={(v) => setTweak('dark', v)} />

//     );

//
// ─────────────────────────────────────────────────────────────────────────────

const __TWEAKS_STYLE = `

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function useTypewriter(words, speed = 80, pause = 1800) {
  const [display, setDisplay] = useState('');
  const [wordIdx, setWordIdx] = useState(0);
  const [charIdx, setCharIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);
  useEffect(() => {
    const word = words[wordIdx];
    const delay = deleting
      ? speed / 2
      : charIdx === word.length ? pause : speed;
    const t = setTimeout(() => {
      if (!deleting) {
        if (charIdx < word.length) {
          setDisplay(word.slice(0, charIdx + 1));
          setCharIdx(c => c + 1);
        } else {
          setDeleting(true);
        }
      } else {
        if (charIdx > 0) {
          setDisplay(word.slice(0, charIdx - 1));
          setCharIdx(c => c - 1);
        } else {
          setDeleting(false);
          setWordIdx(i => (i + 1) % words.length);
        }
      }
    }, delay);
    return () => clearTimeout(t);
  }, [charIdx, deleting, wordIdx, words, speed, pause]);
  return display;
}

function useIntersection(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref, threshold]);
  return visible;
}
